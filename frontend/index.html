<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section id="welcome-screen">

    <div class="container">

        <h1>LaunchPilot</h1>

        <p>
            Get a personalized branding and marketing roadmap
            for your startup in less than one minute.
        </p>

        <button id="start-btn">
            Start Assessment
        </button>

    </div>

</section>

<section id="question-screen">

    <div class="question-card">

        <div id="progress">

    <div id="progress-fill"></div>

</div>

        <h2 id="question-title">
            What industry is your startup in?
        </h2>

        <div id="options-container">

            <button class="option">SaaS</button>
            <button class="option">E-commerce</button>
            <button class="option">Education</button>
            <button class="option">Healthcare</button>

        </div>

        <button id="next-btn">
            Next
        </button>

    </div>

</section>

<section id="loading-screen">

    <div class="loading-card">

<h2>

Analyzing your startup...

</h2>

<p>

Generating your roadmap...

</p>

</div>
</section>

<section id="result-screen">

    <div class="container">

        <h1>Your Startup Report</h1>

        <div id="results">

        </div>

    </div>

</section>

<script src="scripts.js"></script>



</body>
